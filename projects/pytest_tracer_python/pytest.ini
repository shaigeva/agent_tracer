# Using pytest.ini and not pyproject.toml because pytest-watch crashes if there is no pytest.ini.

[pytest]
# Treating all warnings as errors, since there are no specific warnings that we actually need to live with.
filterwarnings =
    error

# Ignore the sample_project fixtures - they're test fixtures, not tests to run
# These tests are run separately via subprocess during cache generation
norecursedirs = tests/fixtures/sample_project tests/fixtures/sample_project_2
